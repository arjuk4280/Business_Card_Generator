<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Business Card Generator</title><link rel="stylesheet" href="style.css"><script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script></head><body><h2>Replace assets/template.png with your template image.</h2><div class='container'><div class='left'><input id='name' placeholder='Name'><input id='job' placeholder='Job'><input id='phone' placeholder='Phone'><input id='email' placeholder='Email'><input id='photo' type='file'><button id='generateBtn'>Generate</button><button id='downloadBtn'>Download</button></div><div id='businessCard' class='card'><img class='template' src='assets/template.png'><div id='cardName' class='name'>Your Name</div><div id='cardJob' class='job'>Job Title</div><div id='cardPhone' class='phone'>+91</div><div id='cardEmail' class='email'>mail@example.com</div><img id='cardPhoto' class='photo'></div></div><script src='script.js'></script></body></html>
