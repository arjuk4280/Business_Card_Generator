<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Lenskart Business Card Generator</title>

    <link rel="stylesheet"
          href="style.css">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap"
          rel="stylesheet">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

</head>

<body>

<div class="container">

    <div class="left-panel">

        <h1>Business Card Generator</h1>

        <label>Name</label>
        <input type="text"
               id="name"
               placeholder="Enter Name">

        <label>Job Title</label>
        <input type="text"
               id="job"
               placeholder="Enter Job Title">

        <label>Phone Number</label>
        <input type="text"
               id="phone"
               placeholder="+91 XXXXX XXXXX">

        <label>Email</label>
        <input type="email"
               id="email"
               placeholder="example@lenskart.com">

        <label>Upload Photo</label>

        <input type="file"
               id="photo"
               accept="image/*">

        <button id="downloadBtn">
            Download Card
        </button>

    </div>

    <!-- CARD -->

    <div class="preview">

        <div id="businessCard"
             class="card">

            <img
                src="assets/template.png"
                class="template">

            <!-- Dynamic Text -->

            <div id="cardName"
                 class="name">
                 Your Name
            </div>

            <div id="cardJob"
                 class="job">
                 Job Title
            </div>

            <div id="cardPhone"
                 class="phone">
                 +91 XXXXX XXXXX
            </div>

            <div id="cardEmail"
                 class="email">
                 example@lenskart.com
            </div>

            <!-- Photo -->

            <img
                id="cardPhoto"
                class="photo"
                src="https://via.placeholder.com/270x320">

        </div>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
