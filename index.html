<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Business Card Generator</title>

    <link rel="stylesheet" href="style.css">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

</head>

<body>

<div class="container">

    <!-- ================= LEFT PANEL ================= -->

    <div class="left-panel">

        <h1>Business Card Generator</h1>

        <label>Name</label>
        <input
            type="text"
            id="name"
            placeholder="Enter Full Name">

        <label>Job Title</label>
        <input
            type="text"
            id="job"
            placeholder="Enter Job Title">

        <label>Phone Number</label>
        <input
            type="text"
            id="phone"
            placeholder="+91 9876543210">

        <label>Email</label>
        <input
            type="email"
            id="email"
            placeholder="name@company.com">

        <label>Upload Photo</label>
        <input
            type="file"
            id="photo"
            accept="image/*">

        <button id="generateBtn">
            Generate Card
        </button>

        <button id="downloadBtn">
            Download Card
        </button>

    </div>

    <!-- ================= RIGHT PANEL ================= -->

    <div class="preview">

        <div
            class="card"
            id="businessCard">

            <!-- Background Template -->

            <img
                class="template"
                src="assets/template.png"
                alt="Business Card Template">

            <!-- Name -->

            <div
                class="name"
                id="cardName">

                Your Name

            </div>

            <!-- Job -->

            <div
                class="job"
                id="cardJob">

                Job Title

            </div>

            <!-- Phone -->

            <div
                class="phone"
                id="cardPhone">

                +91 9876543210

            </div>

            <!-- Email -->

            <div
                class="email"
                id="cardEmail">

                example@email.com

            </div>

            <!-- Employee Photo -->

            <img

                id="cardPhoto"

                class="photo"

                src="https://via.placeholder.com/300x350?text=Photo"

                alt="Employee Photo">

        </div>

    </div>

</div>

<script src="script.js"></script>

</body>

</html>
