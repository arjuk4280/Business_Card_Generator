<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Business Card Generator</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">

        <h1>Business Card Generator</h1>

        <div class="form">

            <label>Name</label>
            <input type="text" id="name" placeholder="Enter Name">

            <label>Job Title</label>
            <input type="text" id="job" placeholder="Enter Job Title">

            <label>Phone Number</label>
            <input type="text" id="phone" placeholder="Enter Phone Number">

            <label>Email</label>
            <input type="email" id="email" placeholder="Enter Email">

            <label>Upload Photo</label>
            <input type="file" id="photo" accept="image/*">

            <button>Generate Card</button>

        </div>

        </div>

    <div class="preview">

        <h2>Card Preview</h2>

        <div class="business-card" id="businessCard">

            <div class="left-side">

                <h1 id="cardName">Your Name</h1>

                <h3 id="cardJob">Job Title</h3>

                <div class="info">
                    📞 <span id="cardPhone">+91 XXXXXXXXXX</span>
                </div>

                <div class="info">
                    ✉ <span id="cardEmail">example@company.com</span>
                </div>

                <div class="info">
                    📍 Sector-74A, Revenue Estate,<br>
                    Village Begumpur Khatola,<br>
                    Gurugram, Haryana-122004
                </div>

                <div class="website">
                    www.lenskart.com
                </div>

            </div>

            <div class="right-side">

                <img
                    id="cardPhoto"
                    src="https://via.placeholder.com/170x220"
                    alt="Photo">

            </div>

        </div>

    </div>

<script src="script.js"></script>

</body>
</html>
